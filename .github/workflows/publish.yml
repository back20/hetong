name: C++ Qt v1.0 Release Build

on:
  push:
    tags:
      - 'v1.*'
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
    - name: 1. 拉取代码仓库
      uses: actions/checkout@v3

    - name: 2. 安装与配置 Qt6 商业级编译固化环境
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'

    - name: 3. 激活微软 MSVC 开发者命令行环境
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: 4. 执行 MOC 预处理与 C++ 深度编译
      shell: cmd
      run: |
        chcp 65001
        mkdir build
        cd build
        qmake ../CraneContractTool.pro CONFIG+=release
        nmake

    - name: 5. 提取 .dll 依赖项并进行无损固化
      shell: cmd
      run: |
        windeployqt --release --no-translations build/release/CraneContractTool.exe

    - name: 6. 封包压缩为绿色即用版 Zip 压缩包
      run: |
        Compress-Archive -Path build/release/* -DestinationPath CraneContractTool_v1.0_Windows.zip

    - name: 7. 自动同步发布到 GitHub Release 下载中心
      uses: softprops/action-gh-release@v1
      with:
        files: CraneContractTool_v1.0_Windows.zip
        name: "Crane Contract Tool v1.0 正式稳定版"
        tag_name: "v1.0-build-${{ github.run_number }}"
        body: |
          ### ⚖️ Crane Contract Tool v1.0 (C++ Core Engine)
          
          **更新日志：**
          1. 采用高容错单文件架构，彻底杜绝多文件 copy 导致的遗漏报错。
          2. 移除了 CMD 编译流程下的非法注释符，解决指令截断问题。
          3. 锁定了 MSVC 下标准的 main.moc 联动编译方案。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
